aid: university-of-oxford
name: University of Oxford
description: >-
  The University of Oxford (Oxford, UK; QS World 2025 #3) is a collegiate
  research university. Historically it ran a notable open-data and developer
  program via the IT Services Open Data Service (data.ox.ac.uk) and the Mobile
  Oxford platform, exposing OxPoints, places, courses, and vacancies via REST,
  SPARQL, and a JavaScript API; that service is now deprecated and its
  API/docs/mobile domains no longer resolve. The clearly live, documented
  public API today is the Bodleian Libraries' ORA (Oxford University Research
  Archive) OAI-PMH metadata interface.
