apis:
  - aid: university-of-oxford:ora
    name: ORA — Oxford University Research Archive API
    description: >-
      Open Archives Initiative Protocol for Metadata Harvesting (OAI-PMH v2.0)
      endpoint for Oxford's institutional open-access repository (theses,
      datasets, and journal articles). Supports verbs such as Identify,
      ListSets, and ListMetadataFormats; metadata formats include oai_dc,
      DataCite, OpenAIRE, RIOXX, and EThOS. Open for normal harvesting; large
      downloads require contacting ORA first.
    humanURL: https://ora.ox.ac.uk/api
    baseURL: https://ora.ox.ac.uk/oai2
    tags:
      - Repository
      - Open Access
      - OAI-PMH
      - Metadata
      - Research Data
    properties:
